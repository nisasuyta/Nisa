<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Belajar Javascript</title>
</head>
<body>
    <h1>Belajar Javascript</h1>
    <p id="demo">Hello</p>

    <!-- inline js -->
     <button onclick="alert(Selama)"></button>
     <script>
        document.getElementById('demo')
        innerHTML = 'Text Hello diubah menjadi Selamat Datang';

        // mengubah warna paragraf id=demo 
        document.getElementById('demo').style.color='pink'; 

        // menampilkan pesan di console 
        console.log('Pesan int dapat dilihat di console browser');

     </script>

     <!-- external js -->
      <script src="script.js"></script>
</body>
</html>
